name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME;
          for (const file of ["manifest.json", "package.json", "package-lock.json"]) {
            const version = JSON.parse(fs.readFileSync(file, "utf8")).version;
            if (version !== tag) {
              throw new Error(`${file} version ${version} does not match tag ${tag}`);
            }
          }
          NODE

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Validate release assets
        run: |
          node --check main.js
          node -e "for (const file of ['manifest.json', 'package.json', 'package-lock.json']) JSON.parse(require('fs').readFileSync(file, 'utf8'));"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css
            assets/alipay.png
            assets/binance.png

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            manifest.json \
            main.js \
            styles.css \
            assets/alipay.png \
            assets/binance.png \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$GITHUB_REF_NAME" \
            --notes "pdftion $GITHUB_REF_NAME release assets built and attested by GitHub Actions."
